<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clair de Lune 8-bit Programmatic Preview</title>
    <style>
      :root {
        color: #f4ead2;
        background: #141823;
        font-family: "Courier New", Consolas, monospace;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(158, 230, 255, 0.1), transparent 34%),
          #141823;
      }

      main {
        display: grid;
        gap: 14px;
        width: min(520px, calc(100vw - 32px));
        padding: 18px;
        border: 2px solid #52607d;
        background: #111624;
        box-shadow: 6px 6px 0 #080b14;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        color: #9ee6ff;
        font-size: 18px;
        line-height: 1.2;
      }

      p {
        color: #cfc5a8;
        font-size: 12px;
        line-height: 1.5;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        min-height: 32px;
        padding: 7px 10px;
        border: 2px solid #5d6b8a;
        color: #141823;
        background: #ffe66d;
        font: inherit;
        font-size: 11px;
        text-transform: uppercase;
        cursor: pointer;
      }

      button:hover {
        background: #d8fff7;
      }

      button.stop {
        color: #f4ead2;
        background: #7d3144;
      }

      label {
        display: grid;
        gap: 5px;
        color: #9ee6ff;
        font-size: 11px;
      }

      input {
        width: 100%;
        accent-color: #ffe66d;
      }

      .now-playing {
        min-height: 20px;
        color: #ffe66d;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Clair de Lune, 8-bit sketch</h1>
      <p>
        A tiny programmatic chiptune draft inspired by Debussy's public-domain
        <em>Clair de Lune</em>. It is intentionally simplified for Aivatar's
        record-player synth rather than copied from a recording.
      </p>

      <div class="controls">
        <button id="play" type="button">Play</button>
        <button id="stop" class="stop" type="button">Stop</button>
      </div>

      <label>
        Volume
        <input id="volume" type="range" min="0" max="100" value="28" />
      </label>

      <div id="status" class="now-playing">Ready.</div>
    </main>

    <script>
      const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
      const NOTE_FREQUENCIES = {
        Db4: 277.18,
        Eb4: 311.13,
        F4: 349.23,
        Gb4: 369.99,
        Ab4: 415.3,
        Bb4: 466.16,
        C5: 523.25,
        Db5: 554.37,
        Eb5: 622.25,
        F5: 698.46,
        Gb5: 739.99,
        Ab5: 830.61,
        Bb5: 932.33,
        Db3: 138.59,
        Ab3: 207.65,
        Bb3: 233.08,
        F3: 174.61,
        Gb3: 185.0,
      };

      const track = {
        title: "Moonlight Bits",
        stepMs: 185,
        leadWave: "triangle",
        bassWave: "square",
        notes: [
          ["F5", 2], ["Eb5", 1], ["Db5", 3], ["Ab4", 2],
          ["Bb4", 2], ["Db5", 2], ["F5", 4],
          ["Eb5", 2], ["Db5", 2], ["C5", 2], ["Ab4", 4],
          ["Db5", 2], ["Eb5", 2], ["F5", 2], ["Ab5", 3], ["Gb5", 1],
          ["F5", 2], ["Eb5", 2], ["Db5", 4],
          ["Ab4", 2], ["Bb4", 2], ["Db5", 2], ["Eb5", 2],
          ["F5", 3], ["Eb5", 1], ["Db5", 2], ["Bb4", 2], ["Ab4", 4],
          ["Db5", 2], ["F5", 2], ["Ab5", 2], ["Bb5", 2],
          ["Ab5", 2], ["Gb5", 2], ["F5", 4],
          ["Eb5", 2], ["Db5", 2], ["Ab4", 2], ["Db5", 6],
        ],
        bass: [
          ["Db3", 4], ["Ab3", 4], ["Bb3", 4], ["F3", 4],
          ["Gb3", 4], ["Db3", 4], ["Ab3", 4], ["Db3", 4],
        ],
      };

      let context = null;
      let masterGain = null;
      let timers = [];
      let playing = false;

      const status = document.getElementById("status");
      const volume = document.getElementById("volume");

      const ensureAudio = () => {
        if (context && masterGain) return;
        context = new AudioContextConstructor();
        masterGain = context.createGain();
        masterGain.gain.value = Number(volume.value) / 100;
        masterGain.connect(context.destination);
      };

      const noteFrequency = (note) => NOTE_FREQUENCIES[note] || 0;

      const scheduleTone = ({ note, start, duration, wave, gainValue }) => {
        const frequency = noteFrequency(note);
        if (!frequency) return;

        const oscillator = context.createOscillator();
        const noteGain = context.createGain();
        oscillator.type = wave;
        oscillator.frequency.value = frequency;

        noteGain.gain.setValueAtTime(0.0001, start);
        noteGain.gain.exponentialRampToValueAtTime(gainValue, start + 0.018);
        noteGain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        oscillator.connect(noteGain);
        noteGain.connect(masterGain);
        oscillator.start(start);
        oscillator.stop(start + duration + 0.03);
      };

      const stop = () => {
        playing = false;
        timers.forEach((timer) => window.clearTimeout(timer));
        timers = [];
        status.textContent = "Stopped.";
      };

      const play = async () => {
        stop();
        ensureAudio();
        if (context.state === "suspended") await context.resume();

        playing = true;
        masterGain.gain.value = Number(volume.value) / 100;
        const stepSeconds = track.stepMs / 1000;
        let cursor = context.currentTime + 0.06;
        let bassIndex = 0;

        track.notes.forEach(([note, steps], index) => {
          const duration = Math.max(0.08, stepSeconds * steps * 0.86);
          scheduleTone({
            note,
            start: cursor,
            duration,
            wave: track.leadWave,
            gainValue: 0.22,
          });

          if (index % 4 === 0) {
            const [bassNote, bassSteps] = track.bass[bassIndex % track.bass.length];
            bassIndex += 1;
            scheduleTone({
              note: bassNote,
              start: cursor,
              duration: Math.max(0.12, stepSeconds * bassSteps * 0.92),
              wave: track.bassWave,
              gainValue: 0.07,
            });
          }

          cursor += stepSeconds * steps;
        });

        const totalMs = Math.max(0, (cursor - context.currentTime) * 1000);
        status.textContent = `Playing: ${track.title}`;
        timers.push(
          window.setTimeout(() => {
            if (!playing) return;
            playing = false;
            status.textContent = "Finished.";
          }, totalMs + 120),
        );
      };

      volume.addEventListener("input", () => {
        if (!masterGain) return;
        masterGain.gain.value = Number(volume.value) / 100;
      });
      document.getElementById("play").addEventListener("click", play);
      document.getElementById("stop").addEventListener("click", stop);
    </script>
  </body>
</html>
